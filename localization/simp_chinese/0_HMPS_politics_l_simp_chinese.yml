 ideology_american_particularism_desc:0 "该集团希望在工作中获得地方自治，摆脱契约奴役的封建条款。然而，奴隶制仍然得到支持。"
 ideology_american_system:0 "美国体制"
 ideology_american_system_desc:0 "美国体系是由亨利·克莱倡导的一种意识形态经济计划，旨在通过保护性关税、国家银行和联邦干预基础设施来加强国家。该计划的支持者反对安德鲁·杰克逊，特别是他赋予所有白人男性选举权和打击银行的计划。"
 ideology_american_intelligentsia:0 "美国知识分子"
 ideology_american_intelligentsia_desc:0 "该集团支持不干预和贸易保护的经济政策。"
 ideology_american_republicanism:0 "美国共和主义"
 ideology_american_republicanism_desc:0 "该集团相信最好的领导者由公众投票选举产生，并支持共和政体。尽管如此，他们更倾向于保持当前的政治现状。"
 ideology_american_liberalism:0 "美国自由主义"
 ideology_american_liberalism_desc:0 "该集团将自由和法律平等视为需要维护的重要价值观。"
 ideology_protectionism:0 "保护主义者"
 ideology_protectionism_desc:0 "这个群体寻求限制外国进口。"
 ideology_cultural_inclusiveness:0 "文化包容"
 ideology_cultural_inclusiveness_desc:0 "这个群体重视辛勤工作，不论出身。"
 ideology_civic_religion:0 "公民宗教"
 ideology_civic_religion_desc:0 "该集团视宪法为神圣——即使是最反动的分子也不敢更改它。"
 ideology_southern_economy:0 "南方经济"
 ideology_southern_economy_desc:0 "该集团视自由贸易和奴隶制为必需品，并将激烈地捍卫和为之战斗。"
 ideology_southern_patriarchy:0 "南方父权制"
 ideology_southern_patriarchy_desc:0 "该集团认为男性应拥有政治权威，女性应服从父权和夫权，国家应有官方宗教。"
 ideology_laissez_faire:0 "寻租者"
 ideology_laissez_faire_desc:0 "政府的权力应用于确保稳定的商业并促进财富积累。"
 ideology_anti_migration:0 "反移民"
 ideology_anti_migration_desc:0 "这个群体视无限制移民为其劳动力价值的威胁。"
 ideology_christian_democrat:0 "基督教民主派"
 ideology_christian_democrat_desc:0 "这个群体坚定信仰基督教价值观并反对专制政府形式。"
 ideology_american_meritocracy:0 "美国精英政治"
 ideology_american_meritocracy_desc:0 "#lore 该集团相信成功是靠努力获得的，那些取得成功的人应当享有随之而来的责任和财富。#!"
 ideology_local_elites: "地方精英"
 ideology_local_elites_desc:0 "殖民政府通过地方精英的地方统治进行治理，从有影响力的地方长官和部族领袖，到王公和佩什瓦。他们的地方自治赋予他们对其领地的巨大影响力。"
 
