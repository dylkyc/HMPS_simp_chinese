 ig_towarzystwo_rolnicze:0 "农业协会"
 ig_german_aristocracy:0 "德意志贵族"
 ig_local_elites:0 "地方精英"
 ig_eight_banners:0 "八旗"
 ig_eight_banners_desc:0 "八旗是后金和清朝时期中国的行政和军事编制，所有满族家庭都被编入其中。在战争中，八旗作为军队运作，但旗制也是整个满族社会的基本组织框架。"
 ig_new_army:0 "新军"
 ig_new_army_desc:0 "新军，全称新建陆军，是19世纪末清朝时期组建的现代化陆军。它被设想为一支按照西方标准进行正规、专业、全面训练和装备的常备军，并配有预备役。"
 
