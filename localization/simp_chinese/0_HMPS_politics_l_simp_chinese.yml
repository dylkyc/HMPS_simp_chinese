 #IG Traits
 ig_trait_treaty_relations:0 "条约关系"
 ig_trait_treaty_relations_desc:0 "我们与租界当局的关系使我们能够继续扩大原材料出口，并与海外伙伴建立出口协议。"
 ig_trait_self_strengthening_industry:0 "自强"
 ig_trait_self_strengthening_industry_desc:0 "我们的智慧和知识必然优于周围的国家。因此，我们需要向国外学习的只有一件事：高效的钢铁制造和创造性发明。"
 ig_trait_culture_of_militarism:0 "普鲁士军国主义"
 ig_trait_culture_of_militarism_desc:0 "军队是我们伟大国家的支柱，确保我们社会和治理中的纪律、秩序和力量。通过强大统一的军队，我们保卫边境、维护传统，并确立我们作为伟大国家领导者的应有地位。"
 institution_schools_desc:0 ""国家的教育系统，确保国民识字率的增长。""