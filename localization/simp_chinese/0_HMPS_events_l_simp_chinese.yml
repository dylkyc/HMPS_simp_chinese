 ### FAQ
 HMPS_FAQ.1.t:0 "常见问题解答"
 HMPS_FAQ.1.d:0 "如果您有进一步的问题，请访问我们在Steam页面上的Discord。"
 HMPS_FAQ.1.f:0 "常见问题已解答。"
 HMPS_FAQ.1.a:0 "接受"
 HMPS_FAQ.1.b:0 "拒绝"
 HMPS_FAQ.1.c:0 "进入选项"
 HMPS_FAQ.1.e:0 "显示更多"
 HMPS_FAQ.1.g:0 "取消"
 HMPS_FAQ.2.t:0 "常见问题"
 HMPS_FAQ.2.d:0 "HMPS对经济进行了许多更改，但这些是最不明显且最可能引起困惑的。"
 HMPS_FAQ.2.a:0 "是"
 HMPS_FAQ.2.a.t:0 "由于马尔萨斯和技术限制，在集约农业研究完成之前无法建造农场。游戏开始时，自给农业是唯一的粮食来源。廉价天然肥料可以在世界各地找到。此外，畜牧业和林业由于土地需求增加，雇佣人数仅为农场的一半。"
 HMPS_FAQ.2.b:0 "否"
 HMPS_FAQ.2.b.t:0 "几乎所有人口晋升都需要更高的教育水平。最重要的是机械师（25%教育水平）和工程师（60%教育水平）。此外，宗教和文化歧视严重限制人口晋升。"
 HMPS_FAQ.2.c:0 "开始维护"
 HMPS_FAQ.3.t:0 "常见问题"
 HMPS_FAQ.3.d:0 "Defines文件是游戏许多数值被硬编码的地方。此列表并非详尽无遗。"
 HMPS_FAQ.3.a:0 "继续"
 HMPS_FAQ.3.a.t:0 "州整合时间已增加。叛乱发生在70%动荡而非50%。奴隶贸易的奴隶迁移已增加。人口增长在15生活水平时达到上限。"
 HMPS_FAQ.3.b:0 "返回"
 HMPS_FAQ.3.b.t:0 "战争支持度每28天而非7天更新一次，导致更长的战争。占领一个国家全部人口将导致战争支持度更快下降。"
 HMPS_FAQ.3.c:0 "开始维护"
 HMPS_FAQ.3.c.t:0 "忠诚派增长率减半，激进派增长率减少三分之一。因此激进派相对原版增长更快。这主要是因为存在可产生无限忠诚派的漏洞。"
 HMPS_FAQ.4.t:0 "常见问题"
 HMPS_FAQ.4.d:0 "外交方面的变化并不多，但由于Vic3模组外交的限制，如果不明确说明会有令人困惑的变化。"
 HMPS_FAQ.4.a:0 "接受"
 HMPS_FAQ.4.a.t:0 "我们试图移除禁止奴隶制和政权更迭，因为它们容易被滥用且缺乏非角色扮演价值。不幸的是我们只取得了部分成功。"
 HMPS_FAQ.4.b:0 "拒绝"
 HMPS_FAQ.4.b.t:0 "我们使开放市场修正更加严苛，降低权威、利益集团批准和合法性。开放市场持续整整10年而非5年递减。"
 HMPS_FAQ.4.c:0 "更多信息"
 HMPS_FAQ.4.c.t:0 "如果印度被释放，它将像中国一样分裂。如果从一个国家转移到另一个国家，将触发事件：要么减少60恶名并释放印度，要么保留附庸并支付罚款。"
 HMPS_FAQ.4.e:0 "完成"
 HMPS_FAQ.4.e.t:0 "我们已经移除了玩家在外交博弈期间"要求某物以换取支持"的能力。此更改不影响玩家提供"无条件支持"的能力。"
 HMPS_FAQ.5.t:0 "常见问题"
 HMPS_FAQ.5.d:0 "这些是与多人游戏相关的各种问题。"
 HMPS_FAQ.5.a:0 "接受"
 HMPS_FAQ.5.a.t:0 "接受此FAQ"
 HMPS_FAQ.5.b:0 "不再显示"
 HMPS_FAQ.5.b.t:0 "最后一个加入游戏的玩家有极高的概率发生不同步。"
 HMPS_FAQ.5.c:0 "了解"
