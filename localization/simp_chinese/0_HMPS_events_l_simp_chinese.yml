 aus_flavor_evt.1.a.t:0 "匈牙利将从我们的统治中分离，并立即开始进行独立战争"
 aus_flavor_evt.3.a.t:0 "圣马可共和国的成立将从我们的统治中分离，并立即开始进行独立战争"
