 aus_flavor_evt.1.t:0 "奥地利政局"
 aus_flavor_evt.1.d:0 "奥地利帝国面临诸多挑战。"
 aus_flavor_evt.1.f:0 "我们未能平息匈牙利人的愤怒，他们已经起义了"
