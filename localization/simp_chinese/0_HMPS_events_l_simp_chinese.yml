 pol_flv.1.f:0 "红与白的形成"
 pol_flv.2.t:0 "布兰科与动荡"
 pol_flv.2.d:0 "作为对无休止戒严令的回应，沙皇颁布法令，再征召一万名波兰人加入俄军。看来一场全国性起义正在酝酿之中。"
 pol_flv.2.a:0 "波兰尚未灭亡！"
 pol_flv.2.f:0 "为了我们的自由，也为了你们的自由"
 pol_flv.3.t:0 "波兰尚未灭亡！"
 pol_flv.3.d:0 "我们已从莫斯科手中赢得了独立，经过半个多世纪的占领，我们终于可以不受任何干涉地处理自己的事务。"
