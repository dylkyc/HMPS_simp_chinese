je_danubian_federation_czech_button_desc: "#green #bold 不排他#!#! 与任何其他文化"

je_danubian_federation_slovak_button:0 ""解决[GetCulture('slovak').GetName]问题""
je_danubian_federation_slovak_button_desc:0 ""[GetCulture('slovak').GetName]人居住的土地长期归属于#b $HUN_ADJ$#!王冠领地，因而承受了严厉的马扎尔化政策，阻碍了其民族认同的发展。此外，[GetCulture('czech').GetName]与[GetCulture('slovak').GetNameNoFormatting]民族主义者历来关系密切，一些人更主张建立一个[GetCulture('czech').GetNameNoFormatting]‑[GetCulture('slovak').GetNameNoFormatting]共同体。若要将[GetCulture('slovak').GetCustom('getPluralDemonym')]成功整合入联邦，必须将该地区从#b 匈牙利#!划出，并妥善解决[GetCulture('czech').GetNameNoFormatting]-[GetCulture('slovak').GetNameNoFormatting]统合问题。""

je_danubian_federation_polish_button:0 ""解决[GetCulture('polish').GetName]问题""
je_danubian_federation_polish_button_desc:0 ""#b 加利西亚#!地区由[GetCulture('polish').GetCustom('getPluralDemonym')]与[GetCulture('ukrainian').GetCustom('getPluralDemonym')]两个民族构成，长期被视作农业落后之地，同时饱受民族冲突困扰。#b 加利西亚#!西部以[GetCulture('polish').GetName]人为主，而东部则以[GetCulture('ukrainian').GetName]人为主，且在传统上受[GetCulture('polish').GetNameNoFormatting]贵族统治。若要整合[GetCulture('polish').GetNameNoFormatting]人的土地，必须决定是否分割#b 加利西亚#!，以及如何确定东部的[GetCulture('polish').GetNameNoFormatting]飞地的归属。""

je_danubian_federation_ukrainian_button:0 ""解决[GetCulture('ukrainian').GetName]问题""
je_danubian_federation_ukrainian_button_desc:0 ""[ROOT.GetCountry.GetNameNoFlag]从#b 波兰立陶宛联邦#!夺取的#b 加利西亚#!区域可以划分为两部分——[GetCulture('ukrainian').GetName]人居住的占绝大部分的东方和[GetCulture('polish').GetName]人居住的西方。整个区域长期由[GetCulture('polish').GetNameNoFormatting]精英统治，[GetCulture('polish').GetNameNoFormatting]飞地存在于#b $STATE_EAST_GALICIA$#!的各主要城市中。若要将[GetCulture('ukrainian').GetNameNoFormatting]土地顺利整合入联邦，#b 加利西亚#!就必须以公平的方式分治，并解决这些[GetCulture('polish').GetNameNoFormatting]飞地的问题。""

je_danubian_federation_north_italian_button:0 ""解决[GetCulture('north_italian').GetName]问题""
je_danubian_federation_north_italian_button_desc:0 ""[GetCulture('north_italian').GetName]王冠领地历来是帝国最富庶的地区之一，承担着[ROOT.GetCountry.GetAdjectiveNoFlag]大部分贸易与航海事务。但这里也极为不安分，意大利民族主义者强烈要求并入[SCOPE.GetRootScope.GetCountry.GetCustom('italy_or_italian_states')]。若要将[GetCulture('north_italian').GetNameNoFormatting]领地整合进联邦，必须压制统一主义情绪，并以令[GetCulture('north_italian').GetNameNoFormatting]民族主义者满意的方式，解决在[GetCulture('south_german').GetName]与[GetCulture('slovene').GetName]区域的[GetCulture('north_italian').GetNameNoFormatting]少数族群问题。""

je_danubian_federation_slovene_button:0 ""解决[GetCulture('slovene').GetName]问题""
je_danubian_federation_slovene_button_desc:0 ""[GetCulture('slovene').GetName]人居住的土地靠近[ROOT.GetCountry.GetNameNoFlag]经济核心，位于#b 利托拉尔#!、#b 卡尔尼奥拉#!与#b 施蒂里亚#!王冠领地内。部分[GetCulture('slovene').GetNameNoFormatting]民族主义者长期呼吁建立南斯拉夫联合体，要求设立涵盖[GetCulture('slovene').GetCustom('getPluralDemonym')]、[GetCulture('croat').GetCustom('getPluralDemonym')]与[GetCulture('serb').GetCustom('getPluralDemonym')]的自治实体。若要整合该地区，需从三块现有王冠领地中划出[GetCulture('slovene').GetNameNoFormatting]自治区，并回答是否设立统一的南斯拉夫自治权的问题。""

je_danubian_federation_croat_button:0 ""解决[GetCulture('croat').GetName]问题""
je_danubian_federation_croat_button_desc:0 ""[GetCulture('croat').GetName]人的土地长期处于分裂——最初分为#b $STATE_CROATIA$#!、#b $STATE_SLAVONIA$#!与#b $STATE_DALMATIA$#!三块王冠领地，后又分别归属于#b $AUS_ADJ$#!与#b $HUN_ADJ$#!。[SCOPE.GetRootScope.GetCountry.GetCustom('triune_kingdom_exists_or_not')]此外，[GetCulture('croat').GetNameNoFormatting]民族主义者长期支持“伊利里亚主义”，主张统一[GetCulture('slovene').GetCustom('getPluralDemonym')]、[GetCulture('croat').GetCustom('getPluralDemonym')]与[GetCulture('serb').GetCustom('getPluralDemonym')]。若要将克罗地亚纳入联邦，必须[SCOPE.GetRootScope.GetCountry.GetCustom('triune_kingdom_exists_or_not_goal')]""

je_danubian_federation_serb_button:0 ""解决[GetCulture('serb').GetName]问题""
je_danubian_federation_serb_button_desc:0 ""帝国的[GetCulture('serb').GetName]人口以#b 伏伊伏丁那#!为中心，长期存在于#b 匈牙利#!管辖下。伏伊伏丁那人口多元、被[GetCulture('hungarian').GetName]民族主义者视为#b 匈牙利#!的核心领土。[GetCulture('serb').GetNameNoFormatting]人总体上乐于接受以[GetCulture('serb').GetNameNoFormatting]或泛斯拉夫国家的形式联邦化，但这么做必将引起该地区其他非[GetCulture('serb').GetNameNoFormatting]人口的不满。""

je_danubian_federation_hungarian_button: "解决[GetCulture('hungarian').GetName]的关切"
je_danubian_federation_hungarian_button_desc: "#red #bold 排他#!#! 与[GetCulture('romanian').GetName]"

je_danubian_federation_romanian_button:0 ""解决[GetCulture('romanian').GetName]问题""
je_danubian_federation_romanian_button_desc:0 ""[GetCulture('romanian').GetName]人居住的土地是帝国最为复杂的地区之一，包括极为多元化的#b 巴纳特#!地区、数量众多的[GetCulture('south_german').GetName]飞地，以及大型[GetCulture('hungarian').GetName]飞地#b 塞凯伊地区#!。围绕该地区划分问题，[GetCulture('romanian').GetNameNoFormatting]与[GetCulture('hungarian').GetNameNoFormatting]民族主义者之间存在激烈争执，同时也涉及本地众多其他少数民族的利益。[SCOPE.GetRootScope.GetCountry.GetCustom('danubian_principalities_exists_or_not')]若要将该地区纳入联邦，必须解决未来[GetCulture('romanian').GetNameNoFormatting]自治区的边界问题，并明确#b 巴纳特#!及该地[GetCulture('south_german').GetNameNoFormatting]和[GetCulture('hungarian').GetNameNoFormatting]飞地的地位。""

