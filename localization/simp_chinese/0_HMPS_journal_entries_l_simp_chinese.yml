je_quarrelsome_children_BRZ:0 "争吵的孩子们"
je_quarrelsome_children_BRZ_reason:0 "在[SCOPE.GetRootScope.GetCountry.GetName]的幼年[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFullName]统治下，已通过我国新国家第91号法令宣布葡萄牙的玛丽亚二世不再是[SCOPE.GetRootScope.GetCountry.GetName]王位的合法继承人。这可能导致我们两国之间产生与里约热内卢条约不相容的裂痕。

在葡萄牙王室接受新继承顺序之前，帝国有冲突风险。

如果我们被葡萄牙在战争中羞辱，我们将被置于与他们的共主邦联之下，[ROOT.GetCountry.GetRuler.GetFullName]将被取代。

葡萄牙也可以放弃巴西，这将使他们失去对王位的宣称并使争吵的孩子们日志条目失效。

如果此日志条目在1840年前未完成，葡萄牙AI将放弃巴西。"
