je_commonwealth:0 "英联邦"
je_commonwealth_reason:0 "未来不必仅属于帝国。随着定居殖民地要求更大自治权，一个由强大自治政权组成的英联邦可能从大不列颠广阔的帝国遗产中涌现。这一天到来之前，不列颠必须首先让其年轻殖民地有时间成熟、人口增长、繁荣昌盛，强大到足以平等而立。

当殖民地达到50%成熟度时将变为自治领，达100%时将变为独立的权力集团成员。成熟度将趋向以下总和：
GDP占大不列颠的百分比
每百万人口0.5%
每点生活水平0.5%
统一+15%
每个其他成熟的定居殖民地+25%"
