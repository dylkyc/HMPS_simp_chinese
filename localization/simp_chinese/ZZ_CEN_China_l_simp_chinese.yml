 # Amendments
 amendment_imperial_exams: "科举制度"
 amendment_imperial_exams_desc:0 "科举考试是为选拔官僚机构候选人而管理的公务员考试制度，削弱了世袭贵族和军事权威的权力，导致了士大夫阶层学者的崛起。"
 amendment_imperial_eunuchs: "太监内廷"
 amendment_imperial_eunuchs_desc:0 "据说宦官代表皇帝的个人意志，而官员代表官僚机构的替代政治意志。宦官以其腐败而臭名昭著，尽管其数量在清朝时期显著减少。"
 amendment_queue_order:0 "辫子法令"
 amendment_queue_order_desc:0 ""留发不留头，留头不留发。"为了强制推行这种发型并证明汉人对清朝统治和满族人的服从，汉族男性被给予最后通牒：采用这种发型，否则面临处决。"