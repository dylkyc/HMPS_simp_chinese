 potato_blight.1.t:0 "欧洲马铃薯危机开始"
 potato_blight.1.d:0 "一种神秘的疾病侵染了[SCOPE.sState('potato_blight_origin').GetName]的马铃薯作物，并正向邻近州蔓延。"
 potato_blight.1.f:0 "欧洲马铃薯危机是由马铃薯枯萎病引起的粮食危机，在19世纪40年代中期席卷北欧和西欧。"
 potato_blight.1.a:0 "自由市场肯定能处理好这件事……"
 potato_blight.2.t:0 "欧洲马铃薯危机"
 potato_blight.2.d:0 "一种侵染马铃薯作物的神秘疾病已在[SCOPE.sState('potato_blight_origin').GetName]开始。它似乎正在迅速蔓延。"
 potato_blight.2.f:0 "枯萎病将在全欧洲蔓延，直到自行耗尽。"
 potato_blight.2.a:0 "让我们祈祷它能避开我们的农田"
 potato_blight.3.t:0 "枯萎病到达我国！"
 potato_blight.3.d:0 "马铃薯枯萎病终于蔓延到了我们的土地，在[SCOPE.sState('potato_blight_origin_local').GetName]州出现。"
 potato_blight.4.t:0 "枯萎病停止蔓延！"
 potato_blight.4.d:0 "枯萎病不再在这片土地上蔓延。其当前范围已是其扩展的最大限度。"
 potato_blight.4.f:0 "枯萎病将存续不可预知的年数，直到它自行开始消退。"
 potato_blight.4.a:0 "上帝保佑我们！"
 potato_blight.5.t:0 "爱尔兰外迁"
 potato_blight.5.d:0 "由于政治歧视，爱尔兰外迁随马铃薯枯萎病的到来而增加。"
 potato_blight.5.f:0 "他们难道不能靠自力更生振作起来吗？"
 potato_blight.5.a:0 "等等，回来！"
 potato_blight.5.a.t1:0 "每个遭受枯萎病的爱尔兰州将获得以下修正"
 potato_blight.6.t:0 "枯萎病开始消退！"
 potato_blight.6.d:0 "报告开始传到首都，枯萎病似乎终于开始消退。"
 potato_blight.6.f:0 "疾病无法经受我们的耐心。我们挺过来了。"
 potato_blight.6.a:0 "让我们期待未来的好时光！"'s look forward to good times ahead!"
 gutter_crown_war:0 "德国统一战争"
 railroad_bubble.3.t:0 "铁路狂热！"
 railroad_bubble.3.d:0 "铁路行业发现，无论建了多少，铁路总是一项好投资。投入铁路的资金越多，利润似乎越高！"
 railroad_bubble.3.f:0 "国家对铁路的强烈需求使投资者越来越脱离铁路的实际价值。尽管有风险，资本家仍将无休止地建造铁路。"
 railroad_bubble.3.a:0 "当前趋势将无限持续！"
 railroad_bubble.3.a.t:0 "每条铁路将获得一个修正，提高产出同时降低感知基础设施贡献。此修正将随着泡沫的增长而增加。"
 railroad_bubble.5.t:0 "泡沫达到顶峰！"
 railroad_bubble.5.d:0 "铁路的感知价值一路上涨，直到达到当前顶峰。虽然没有人相信价格还能更高，"
 railroad_bubble.5.f:0 "泡沫修正将在你的国家持续约五个月，然后泡沫破裂。"
 railroad_bubble.5.a:0 "不可能出什么差错的！"'t possibly go wrong!"
 railroad_bubble.5.a.t:0 "泡沫将在破裂前停止增长一段时间！"
 railroad_bubble.6.t:0 "泡沫破裂！"
 railroad_bubble.6.d:0 "投资者集体意识到铁路价格过高，纷纷争先恐后地重新调整。许多与铁路相关的财富瞬间化为乌有。"
 railroad_bubble.6.f:0 "由于大量资金投资于低效项目，造成了巨大损失。经济力量需要时间重新调整。"
 railroad_bubble.6.a:0 "我们可以重建！"
 railroad_bubble.6.a.t:0 "所有铁路和州将失去其吞吐量修正。"
 pedro.7.a.t:0 "巴西新世界州内所有非洲传承特质的种群将变为非裔巴西人"
 je_caucasian_war_reason: "我们在高加索山脉的领土野心遭到当地激烈抵抗的阻碍。我们必须镇压所有剩余抵抗，以确保南部边境安全，并为移民开辟这些领土。"