 wine_blight:0 "葡萄酒枯萎病"
 wine_blight_evt.1.t:0 "葡萄酒枯萎病"
 wine_blight_evt.1.d:0 "大葡萄酒枯萎病是19世纪中期一场严重的枯萎病，摧毁了西欧许多葡萄园，使葡萄酒产业遭受重大损失。"
 wine_blight_evt.1.f:0 "这是由一种起源于北美、于19世纪50年代末横跨大西洋传播的蚜虫引起的。这种蚜虫通常被认为是葡萄根瘤蚜。"
 wine_blight_evt.1.a:0 "我们必须找到解决方案！"
 wine_blight_evt.1.a.t:0 "小麦农场和葡萄园的葡萄酒产出将减少75%，直到枯萎病结束。"
 wine_blight_evt.2.t:0 "葡萄酒枯萎病蔓延"
 wine_blight_evt.2.d:0 "大葡萄酒枯萎病是19世纪中期一场严重的枯萎病，摧毁了西欧许多葡萄园，使葡萄酒产业遭受重大损失。"
 wine_blight_evt.2.f:0 "它是由一种原产于北美的蚜虫引起的，该蚜虫在19世纪50年代末被带过大西洋。"
 wine_blight_evt.2.a:0 "现在蔓延到了我们这里！"
 wine_blight_evt.3.t:0 "葡萄酒枯萎病结束"
 wine_blight_evt.3.a.t:0 "我们国家每个州的葡萄酒枯萎病修正将被移除。"
 wine_blight_evt.3.d:0 "无尽的枯萎病终于离开了我们的田野。现在我们终于可以解渴了！"
 wine_blight_evt.3.f:0 "根瘤蚜在19世纪摧毁了法国葡萄园。将抗病的美国葡萄藤与脆弱的欧洲葡萄藤嫁接最终被证明是成功的。"
 wine_blight_evt.3.a:0 "让我们开一瓶酒！"
 building_military_shipyard:0 "军用造船厂"
