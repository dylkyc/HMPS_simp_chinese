 je_meiji_restoration_reason:0 ""#v $JAP$#!的开国掀起了一股席卷时代的浪潮，其来势之汹涌，即便是统治全国的#b 幕府#!亦难以驾驭。[SelectLocalization(SCOPE.sPoliticalMovement('meiji_movement_scope').IsValid, SCOPE.sPoliticalMovement('meiji_movement_scope').GetName, 'movement_meiji_restorationist_name')]的激进分子对入侵的外国势力怒不可遏，要求废黜$RULER_TITLE_SHOGUN$，将大政奉还于#b $RULER_TITLE_EMPEROR$#!，并驱除夷人。另一方面，野心勃勃的诸[SCOPE.gsInterestGroup('daimyo_ig').GetName]也试图利用幕府的一时虚弱，趁机分得一杯羹。\n\n日本若想在此百年未有之大变局中争得一席之地，就必须推行改革、富国强兵，还要解决主权在法理和事实之间分离的矛盾。不管是独掌大权，还是与幕府共治，天皇陛下都必须亲政。\n\n@warning!随着[SelectLocalization(SCOPE.sPoliticalMovement('meiji_movement_scope').IsValid, SCOPE.sPoliticalMovement('meiji_movement_scope').GetName, 'movement_meiji_restorationist_name')]的[Concept('concept_activism', '$concept_activism_short$')]不断增加，尊王派将谋求采取更强硬的手段实现大政奉还。""
